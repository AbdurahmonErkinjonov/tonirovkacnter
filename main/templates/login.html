{% extends 'base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-75 align-items-center">
    <div class="col-md-6 col-lg-4">
        <div class="card animate__animated animate__fadeInUp glow-animation">
            <div class="card-header bg-gradient text-white text-center py-4">
                <img src="/media/logo1.png" alt="Logo" height="80" class="mb-3 animate__animated animate__pulse">
                <h3 class="mb-0"> Tonirovka Center</h3>
                <p class="mb-0 mt-2 small">Kirish</p>
            </div>
            <div class="card-body p-4">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-user"></i> Login
                        </label>
                        <input type="text" class="form-control form-control-lg" name="username" required autofocus
                               placeholder="Loginingizni kiriting">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> Parol
                        </label>
                        <input type="password" class="form-control form-control-lg" name="password" required
                               placeholder="Parolingizni kiriting">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-sign-in-alt"></i> Kirish
                    </button>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent border-0 pb-4">
                <small class="text-muted">
                    <i class="fas fa-shield-alt"></i> Xavfsiz tizim
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
