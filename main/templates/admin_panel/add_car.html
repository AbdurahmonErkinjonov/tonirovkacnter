{% extends 'base.html' %}

{% block title %}Ish qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-plus-circle"></i> Ish qo'shish</h4>
            </div>
            <div class="card-body">
                <form method="post" id="workForm">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Mashina nomi</label>
                        <input type="text" name="car_name" class="form-control" required placeholder="Mashina nomi (masalan: Gentra)">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Egasining telefon raqami (ixtiyoriy)</label>
                        <input type="text" name="owner_phone" class="form-control" placeholder="+998 90 123 45 67">
                    </div>
                    
                    <h5 class="mt-4">Qaysi qismlar ishlangan?</h5>
                    <div id="parts-container">
                        <div class="part-item row mb-2">
                            <div class="col-10">
                                <input type="text" name="part_name[]" class="form-control" placeholder="Qism nomi (masalan: Orqa eshik)">
                            </div>
                            <div class="col-2">
                                <button type="button" class="btn btn-danger remove-part" style="display: none;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" id="add-part" class="btn btn-sm btn-success mb-3">
                        <i class="fas fa-plus"></i> Qism qo'shish
                    </button>
                    
                    <div class="text-end mt-4">
                        <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Bekor qilish</a>
                        <button type="submit" class="btn btn-success">Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('add-part').addEventListener('click', function() {
    const container = document.getElementById('parts-container');
    const newDiv = document.createElement('div');
    newDiv.className = 'part-item row mb-2';
    newDiv.innerHTML = `
        <div class="col-10">
            <input type="text" name="part_name[]" class="form-control" placeholder="Qism nomi">
        </div>
        <div class="col-2">
            <button type="button" class="btn btn-danger remove-part">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    `;
    container.appendChild(newDiv);
    
    document.querySelectorAll('.remove-part').forEach(btn => {
        btn.style.display = 'inline-block';
    });
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-part') || e.target.parentElement.classList.contains('remove-part')) {
        const btn = e.target.classList.contains('remove-part') ? e.target : e.target.parentElement;
        btn.closest('.part-item').remove();
        
        if (document.querySelectorAll('.part-item').length === 1) {
            document.querySelectorAll('.remove-part').forEach(btn => {
                btn.style.display = 'none';
            });
        }
    }
});
</script>
{% endblock %}
