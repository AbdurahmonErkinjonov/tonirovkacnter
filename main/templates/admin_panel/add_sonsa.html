{% extends 'base.html' %}

{% block title %}Sonsa zashita qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card animate__animated animate__fadeInUp">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-shield-alt"></i> Yangi sonsa zashita qo'shish</h4>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Sonsa zashita nomi</label>
                        {{ form.name }}
                        {% if form.name.errors %}
                            <div class="text-danger">{{ form.name.errors }}</div>
                        {% endif %}
                        <div class="form-text">Masalan: "Standart", "Premium", "Max"</div>
                    </div>
                    
                    <div class="text-end">
                        <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Bekor qilish
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
