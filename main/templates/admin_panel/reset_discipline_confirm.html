{% extends 'base.html' %}

{% block title %}Statistikani tozalash{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card" style="border: 2px solid #dc3545;">
            <div class="card-header" style="background-color: #dc3545; color: white;">
                <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Statistikani tozalash</h4>
            </div>
            <div class="card-body">
                <p class="lead">Siz rostdan ham barcha intizom statistikasini tozalamoqchimisiz?</p>
                <p class="text-muted">Bu amalni ortga qaytarib bo'lmaydi.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'discipline_ranking' %}" class="btn btn-secondary">Bekor qilish</a>
                        <button type="submit" class="btn btn-danger">Ha, tozalash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
