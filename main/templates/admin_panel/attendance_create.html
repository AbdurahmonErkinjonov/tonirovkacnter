{% extends 'base.html' %}

{% block title %}Davomat qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card animate__animated animate__fadeInUp">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-plus"></i> Davomat qo'shish</h4>
            </div>
            <div class="card-body">
                <h5 class="mb-4">{{ worker.full_name }} - {{ date|date:"d-m-Y" }}</h5>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Kelgan vaqti</label>
                        <div class="row">
                            <div class="col-6">
                                <input type="date" name="check_in_date" class="form-control" 
                                       value="{{ date|date:'Y-m-d' }}" required>
                            </div>
                            <div class="col-6">
                                <input type="time" name="check_in_time" class="form-control" 
                                       value="09:00" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Ketgan vaqti (ixtiyoriy)</label>
                        <div class="row">
                            <div class="col-6">
                                <input type="date" name="check_out_date" class="form-control" 
                                       value="{{ date|date:'Y-m-d' }}">
                            </div>
                            <div class="col-6">
                                <input type="time" name="check_out_time" class="form-control" 
                                       value="18:00">
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-end">
                        <a href="{% url 'attendance_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Bekor qilish
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
